<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="icon" href="data:,">
    <title>Bloody — временные ограничения</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #0a0a0f 0%, #0c0b13 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin: 0;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 40%, rgba(139, 0, 0, 0.15) 0%, transparent 70%),
                        radial-gradient(circle at 80% 70%, rgba(180, 0, 0, 0.1) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .message-container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            background: rgba(10, 8, 18, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(200, 40, 40, 0.2);
            position: relative;
            z-index: 1;
            padding: 40px 28px;
            text-align: center;
            animation: fadeInScale 0.5s ease-out;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.96);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Декоративный уголок */
        .message-container::before {
            content: '🩸';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.5rem;
            background: linear-gradient(135deg, #ff6666, #ff4444);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
            filter: drop-shadow(0 0 6px rgba(255,68,68,0.4));
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .logo-icon {
            font-size: 3rem;
            filter: drop-shadow(0 0 8px rgba(255,68,68,0.5));
            animation: gentlePulse 2s infinite ease-in-out;
        }

        @keyframes gentlePulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        .site-title {
            font-weight: 800;
            font-size: 2rem;
            background: linear-gradient(135deg, #ff8888, #ff4444, #aa2222);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .divider {
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ff4444, #ff8888, #ff4444, transparent);
            margin: 16px auto 24px auto;
            border-radius: 3px;
        }

        .message-text {
            font-size: 1.2rem;
            font-weight: 600;
            color: #ffe6dd;
            margin-bottom: 18px;
            line-height: 1.4;
            background: rgba(0, 0, 0, 0.4);
            display: inline-block;
            padding: 8px 24px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }

        .description {
            font-size: 0.95rem;
            color: #ccaa99;
            margin-bottom: 32px;
            line-height: 1.5;
            padding: 0 10px;
        }

        .channel-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #aa2222, #660000);
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.85rem;
            color: #ffdddd;
            text-decoration: none;
            transition: all 0.2s ease;
            margin-top: 16px;
            border: 1px solid rgba(255, 100, 100, 0.4);
            backdrop-filter: blur(4px);
        }

        .channel-badge:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #cc3333, #880000);
            box-shadow: 0 5px 15px rgba(200, 40, 40, 0.3);
        }

        .channel-badge:active {
            transform: translateY(1px);
        }

        .footer-note {
            margin-top: 32px;
            font-size: 0.6rem;
            color: #776677;
            border-top: 1px solid rgba(255, 80, 80, 0.2);
            padding-top: 20px;
        }

        .blood-drop {
            position: absolute;
            bottom: 15px;
            right: 20px;
            font-size: 0.75rem;
            opacity: 0.3;
            pointer-events: none;
        }

        /* адаптация */
        @media (max-width: 480px) {
            .message-container {
                padding: 32px 20px;
            }
            .site-title {
                font-size: 1.6rem;
            }
            .logo-icon {
                font-size: 2.5rem;
            }
            .message-text {
                font-size: 1rem;
                padding: 6px 20px;
            }
            .description {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
<div class="message-container">
    <div class="logo">
        <div class="logo-icon">🩸</div>
        <div class="site-title">Bloody</div>
    </div>
    <div class="divider"></div>
    
    <div class="message-text">
        ⚠️ К сожалению, бот больше не поддерживается в вашем регионе
    </div>
    
    <div class="description">
        Мы ценим каждого участника и надеемся на понимание.<br>
        Следите за обновлениями в официальном канале.
    </div>
    
    <a href="https://t.me/b_loody" target="_blank" rel="noopener noreferrer" class="channel-badge">
        📢 @b_loody — официальный канал
    </a>
    
    <div class="footer-note">
        © Bloody Project<br>
        Информация временно ограничена
    </div>
    <div class="blood-drop">🩸</div>
</div>
</body>
</html>
